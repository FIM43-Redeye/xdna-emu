# xdna-emu configuration
# This file configures paths for the emulator.
#
# These defaults assume the standard sibling directory layout:
#   npu-work/
#     llvm-aie/
#     mlir-aie/
#     xdna-emu/    <-- you are here
#
# Override with absolute paths or set environment variables:
#   LLVM_AIE_PATH, MLIR_AIE_PATH, XRT_PATH

# Path to llvm-aie repository (required for instruction decoding)
# Contains TableGen files defining the AIE2 ISA
llvm_aie_path = "../llvm-aie"

# Path to mlir-aie repository (for test discovery)
mlir_aie_path = "../mlir-aie"

# Path to XRT installation (uncomment and set for your platform)
# Linux default: /opt/xilinx/xrt
# Windows: set via XRT_PATH environment variable
# xrt_path = "/opt/xilinx/xrt"
