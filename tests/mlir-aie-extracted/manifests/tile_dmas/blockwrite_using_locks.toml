[test]
name = "tile_dmas/blockwrite_using_locks"
source_dir = "test/npu-xrt/tile_dmas/blockwrite_using_locks"
description = "Tile DMA passthrough using blockwrite BD config with lock synchronization"

[build]
mlir_file = "aie.mlir"
device = "npu1_1col"

[buffers.input_a]
size = 4096
element_type = "i32"
group_id = 3

[buffers.input_a.pattern]
type = "sequential"
start = 1
step = 1

[buffers.output]
size = 4096
element_type = "i32"
group_id = 5

[expected]
type = "transform"
transform = "input_a + 0"
