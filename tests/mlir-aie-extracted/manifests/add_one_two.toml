# Test manifest for add_one_two
# Source: test/npu-xrt/add_one_two
# Two chained kernels: ADDONE (+1) then ADDTWO (+2), net effect is +3
#
# Sequential execution: host runs ADDONE, waits, copies output to
# ADDTWO input, runs ADDTWO, waits. Both kernels share insts.bin.
# Both use gid=3 (input), gid=4 (unused), gid=5 (output).

[test]
name = "add_one_two"
source_dir = "test/npu-xrt/add_one_two"
description = "Two chained add kernels (+1 then +2) producing input+3"
platform = "npu2"
skip_reason = "Multi-kernel sequential execution; second kernel hangs on npu1 (Phoenix)"

[build]
mlir_file = "aie.mlir"
device = "npu1_1col"

[buffers.input_a]
size = 64
element_type = "i32"
group_id = 3

[buffers.input_a.pattern]
type = "sequential"
start = 1
step = 1

[buffers.output]
size = 64
element_type = "i32"
group_id = 5

[expected]
type = "transform"
transform = "input_a + 3"

# Multi-kernel execution: two kernels run sequentially with buffer linking.
# ADDONE output (gid=5) is copied to ADDTWO input (gid=3).
[multi_kernel]
mode = "sequential"

[[multi_kernel.runs]]
kernel = "ADDONE"
insts = "insts.bin"

[[multi_kernel.runs]]
kernel = "ADDTWO"
insts = "insts.bin"

[[multi_kernel.links]]
from_run = 0
from_group_id = 5
to_run = 1
to_group_id = 3
