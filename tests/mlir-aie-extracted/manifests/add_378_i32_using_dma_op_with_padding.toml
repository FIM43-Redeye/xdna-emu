[test]
name = "add_378_i32_using_dma_op_with_padding"
source_dir = "test/npu-xrt/add_378_i32_using_dma_op_with_padding"
description = "Add 378 to each element with DMA padding (zeros at block boundaries)"
expected_fail = true
expected_fail_reason = "DMA padding zeroes positions 0,1,15 in each 16-element block; simple add does not capture this"

[build]
mlir_file = "aie.mlir"
device = "npu1_1col"

# Input: 52 i32 (sequential 1..52)
# Output: 64 i32 with padding applied per 16-element block
# Padded positions (0,1,15 in each block) get 0+378, others get input+378

[buffers.input_a]
size = 52
element_type = "i32"
group_id = 3

[buffers.input_a.pattern]
type = "sequential"
start = 1
step = 1

[buffers.output]
size = 64
element_type = "i32"
group_id = 5

[expected]
type = "reference"
# Expected output loaded from tests/npu-outputs/add_378_i32_using_dma_op_with_padding/output.bin
# Padding: positions 0,1,15 in each 16-element block get 0+378, others get input+378
