# Test manifest for tile_mapped_read
# Source: test/npu-xrt/tile_mapped_read
# Reads lock init values (42-49) from tile(0,2) in cyclic pattern

[test]
name = "tile_mapped_read"
source_dir = "test/npu-xrt/tile_mapped_read"
description = "Read lock initialization values via tile-mapped memory access"

[build]
mlir_file = "aie.mlir"
device = "npu1_1col"
compiler = "chess"

[buffers.input_a]
size = 64
element_type = "i32"
group_id = 3

[buffers.input_a.pattern]
type = "constant"
value = 0

[buffers.output]
size = 64
element_type = "i32"
group_id = 4

# Output is cyclic: lock values 42,43,44,45,46,47,48,49 repeated 8 times
[expected]
type = "values"
values = [
    42, 43, 44, 45, 46, 47, 48, 49,
    42, 43, 44, 45, 46, 47, 48, 49,
    42, 43, 44, 45, 46, 47, 48, 49,
    42, 43, 44, 45, 46, 47, 48, 49,
    42, 43, 44, 45, 46, 47, 48, 49,
    42, 43, 44, 45, 46, 47, 48, 49,
    42, 43, 44, 45, 46, 47, 48, 49,
    42, 43, 44, 45, 46, 47, 48, 49,
]
