# Test manifest for static_L1_init
# Source: test/npu-xrt/static_L1_init
# Vector-vector add with L1 memory initialization

[test]
name = "static_L1_init"
source_dir = "test/npu-xrt/static_L1_init"
description = "Vector-vector addition with static L1 memory initialization"

[build]
mlir_file = "aie.mlir"
device = "npu1_1col"

[buffers.input_a]
size = 256
element_type = "i32"
group_id = 3

[buffers.input_a.pattern]
type = "sequential"
start = 1
step = 1

[buffers.input_b]
size = 256
element_type = "i32"
group_id = 4

[buffers.input_b.pattern]
type = "sequential"
start = 0
step = 1

[buffers.output]
size = 256
element_type = "i32"
group_id = 5

[expected]
type = "transform"
transform = "input_a + input_b"
