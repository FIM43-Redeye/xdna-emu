[test]
name = "objectfifo_repeat/simple_repeat"
source_dir = "test/npu-xrt/objectfifo_repeat/simple_repeat"
description = "ObjectFifo repeat: input copied 4x to output via memtile link"
expected_fail = true
expected_fail_reason = "Output 4x larger than input (repeat_count=4), not expressible as element-wise transform"

[build]
mlir_file = "aie2.py"
device = "npu1_1col"

# Input: 4096 i32, Output: 16384 i32 (4x repeat)
# output[i] = input[i % 4096]

[buffers.input_a]
size = 4096
element_type = "i32"
group_id = 3

[buffers.input_a.pattern]
type = "sequential"
start = 1
step = 1

[buffers.output]
size = 16384
element_type = "i32"
group_id = 5

[expected]
type = "transform"
transform = "input_a + 0"
