[test]
name = "objectfifo_repeat/init_values_repeat"
source_dir = "test/npu-xrt/objectfifo_repeat/init_values_repeat"
description = "ObjectFifo repeat: MLIR init values (not host input) repeated 4x to output"
expected_fail = true
expected_fail_reason = "Uses MLIR-defined init values, not host input; output 4x input size"

[build]
mlir_file = "aie2.py"
device = "npu1_1col"

# Host input (4096 i32, values 2..N+1) is NOT used by the kernel.
# The kernel reads MLIR-initialized values (1..N) and repeats them 4x.
# Output: 16384 i32 where output[i] = (i % 4096) + 1

[buffers.input_a]
size = 4096
element_type = "i32"
group_id = 3

[buffers.input_a.pattern]
type = "sequential"
start = 2
step = 1

[buffers.output]
size = 16384
element_type = "i32"
group_id = 5

[expected]
type = "transform"
transform = "input_a + 0"
