[test]
name = "memtile_dmas/dma_configure_task_lock"
source_dir = "test/npu-xrt/memtile_dmas/dma_configure_task_lock"
description = "Complex memtile DMA with quarter-rearrangement and offset additions"
expected_fail = true
expected_fail_reason = "Complex multi-BD rearrangement not expressible as simple transform"

[build]
mlir_file = "aie.mlir"
device = "npu1_1col"

# Uses only 2 buffers (no input_b), with 4096 elements each.
# The DMA splits input into 4 quarters and rearranges them:
#   out[0:1024]    = in[2048:3072] + 2048
#   out[1024:2048] = in[0:1024]
#   out[2048:3072] = in[3072:4096] + 3072
#   out[3072:4096] = in[1024:2048] + 1024

[buffers.input_a]
size = 4096
element_type = "i32"
group_id = 3

[buffers.input_a.pattern]
type = "sequential"
start = 1
step = 1

[buffers.output]
size = 4096
element_type = "i32"
group_id = 4

[expected]
type = "transform"
transform = "input_a + 0"
