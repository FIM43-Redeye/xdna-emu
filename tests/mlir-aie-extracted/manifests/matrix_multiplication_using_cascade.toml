# Test manifest for matrix_multiplication_using_cascade
# Source: test/npu-xrt/matrix_multiplication_using_cascade
# 16x16 i32 matrix multiply using 4 cascade-connected cores
# Three variants: aie2_plain, aie2_buffer, aie2_cascade

[test]
name = "matrix_multiplication_using_cascade"
source_dir = "test/npu-xrt/matrix_multiplication_using_cascade"
description = "16x16 i32 matrix multiplication via 4-core cascade"

[build]
mlir_file = "aie_cascadex4.mlir"
device = "npu1_1col"
compiler = "chess"

[buffers.input_a]
size = 256
element_type = "i32"
group_id = 3

[buffers.input_a.pattern]
type = "sequential"
start = 1
step = 1

[buffers.input_b]
size = 256
element_type = "i32"
group_id = 4

[buffers.input_b.pattern]
type = "sequential"
start = 1
step = 1

[buffers.output]
size = 256
element_type = "i32"
group_id = 5

# Matrix multiply is too complex for simple transform expression;
# use captured HW output for validation
[expected]
type = "reference"
