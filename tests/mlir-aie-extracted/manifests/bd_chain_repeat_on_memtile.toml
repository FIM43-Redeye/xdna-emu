# Test manifest for bd_chain_repeat_on_memtile
# Source: test/npu-xrt/bd_chain_repeat_on_memtile
# Each 1024-byte input chunk is repeated 2x in output via BD chain repeat

[test]
name = "bd_chain_repeat_on_memtile"
source_dir = "test/npu-xrt/bd_chain_repeat_on_memtile"
description = "MemTile BD chain with repeat_count=2 for data duplication"

[build]
mlir_file = "aie2.py"
device = "npu1_2col"
compiler = "chess"

[buffers.input_a]
size = 16384
element_type = "u8"
group_id = 3

[buffers.input_a.pattern]
type = "sequential"
start = 0
step = 1

[buffers.output]
size = 32768
element_type = "u8"
group_id = 4

# 32K elements with chunk repetition pattern; too large for values array
[expected]
type = "reference"
