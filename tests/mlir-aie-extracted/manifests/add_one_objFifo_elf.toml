# Test manifest for add_one_objFifo_elf
# Source: test/npu-xrt/add_one_objFifo_elf
# Same as add_one_objFifo but uses ELF instruction format variant

[test]
name = "add_one_objFifo_elf"
source_dir = "test/npu-xrt/add_one_objFifo_elf"
description = "Add-one via objFifo with ELF instruction format"
expected_fail = false

[build]
mlir_file = "aie.mlir"
device = "npu1_1col"

[buffers.input_a]
size = 64
element_type = "i32"
group_id = 3

[buffers.input_a.pattern]
type = "sequential"
start = 1
step = 1

[buffers.output]
size = 64
element_type = "i32"
group_id = 5

[expected]
type = "transform"
transform = "input_a + 41"
