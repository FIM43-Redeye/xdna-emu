[test]
name = "dma_task_large_linear"
source_dir = "test/npu-xrt/dma_task_large_linear"
description = "Large linear DMA transfer: 65536 elements, each incremented by 1"
expected_fail = true
expected_fail_reason = "Core processes 65K elements (~851K cycles) without DMA activity, exceeding TDR stall detection threshold"

[build]
mlir_file = "aie2.py"
device = "npu1_1col"

[buffers.input_a]
size = 65536
element_type = "i32"
group_id = 3

[buffers.input_a.pattern]
type = "sequential"
start = 0
step = 1

[buffers.output]
size = 65536
element_type = "i32"
group_id = 4

[expected]
type = "transform"
transform = "input_a + 1"
