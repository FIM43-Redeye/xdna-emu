# Test manifest for ctrl_packet_reconfig_elf
# Source: test/npu-xrt/ctrl_packet_reconfig_elf
# Kernel adds 3 to each i8 element, loaded via XRT ELF module

[test]
name = "ctrl_packet_reconfig_elf"
source_dir = "test/npu-xrt/ctrl_packet_reconfig_elf"
description = "ELF-module-loaded add-3 kernel with control packet reconfig"

[build]
mlir_file = "aie.mlir"
device = "npu1_1col"
compiler = "chess"

[buffers.input_a]
size = 4096
element_type = "i8"
group_id = 3

[buffers.input_a.pattern]
type = "sequential"
start = 1
step = 1

[buffers.output]
size = 4096
element_type = "i8"
group_id = 4

[expected]
type = "transform"
transform = "input_a + 3"
