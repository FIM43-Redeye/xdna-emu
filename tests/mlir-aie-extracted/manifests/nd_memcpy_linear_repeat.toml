[test]
name = "nd_memcpy_linear_repeat"
source_dir = "test/npu-xrt/nd_memcpy_linear_repeat"
description = "ND memcpy with linear repeat: input repeated 3x to output via stride-0 DMA"
expected_fail = true
expected_fail_reason = "Output 3x larger than input (repeat_count=3), i16 element type, stride-0 DMA"

[build]
mlir_file = "aie2.py"
device = "npu1_1col"

# Input: 2048 i16 elements [0, 2, 4, ..., 4094]
# Output: 6144 i16 elements (3 copies of input, via stride-0 repeat)

[buffers.input_a]
size = 2048
element_type = "i16"
group_id = 3

[buffers.input_a.pattern]
type = "sequential"
start = 0
step = 2

[buffers.output]
size = 6144
element_type = "i16"
group_id = 5

[expected]
type = "transform"
transform = "input_a + 0"
