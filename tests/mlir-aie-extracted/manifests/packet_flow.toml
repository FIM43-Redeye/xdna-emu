# Test manifest for packet_flow
# Source: test/npu-xrt/packet_flow
# Kernel adds 12 to each byte; input is constant 1, so output is 13

[test]
name = "packet_flow"
source_dir = "test/npu-xrt/packet_flow"
description = "Packet-routed flow, each element = 1 + 12 = 13"

[build]
mlir_file = "aie.mlir"
device = "npu1_1col"

[buffers.input_a]
size = 4096
element_type = "i8"
group_id = 3

[buffers.input_a.pattern]
type = "constant"
value = 1

[buffers.output]
size = 4096
element_type = "i8"
group_id = 5

[expected]
type = "transform"
transform = "13"
