[test]
name = "column_specific"
source_dir = "test/npu-xrt/column_specific"
description = "Column-specific addressing with DMA passthrough"

[build]
mlir_file = "aie2.py"
device = "npu1_1col"

[buffers.input_a]
size = 4096
element_type = "i32"
group_id = 3

[buffers.input_a.pattern]
type = "sequential"
start = 1
step = 1

[buffers.output]
size = 4096
element_type = "i32"
group_id = 5

[expected]
type = "transform"
transform = "input_a + 0"
