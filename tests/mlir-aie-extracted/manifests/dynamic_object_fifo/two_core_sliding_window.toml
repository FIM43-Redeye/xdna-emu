# Test manifest for dynamic_object_fifo/two_core_sliding_window
# Source: test/npu-xrt/dynamic_object_fifo/two_core_sliding_window
# Two-stage pipeline: passthrough then sliding window add (same result)

[test]
name = "dynamic_object_fifo/two_core_sliding_window"
source_dir = "test/npu-xrt/dynamic_object_fifo/two_core_sliding_window"
description = "Two-core pipeline with passthrough stage then sliding window addition"

[build]
mlir_file = "aie2.py"
device = "npu1_1col"
compiler = "chess"

