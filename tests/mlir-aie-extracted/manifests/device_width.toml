[test]
name = "device_width"
source_dir = "test/npu-xrt/device_width"
description = "Device width parameter test with DMA passthrough"

[build]
mlir_file = "aie2.py"
device = "npu1_1col"

[buffers.input_a]
size = 4096
element_type = "i32"
group_id = 3

[buffers.input_a.pattern]
type = "sequential"
start = 1
step = 1

[buffers.output]
size = 4096
element_type = "i32"
group_id = 5

[expected]
type = "transform"
transform = "input_a + 0"
