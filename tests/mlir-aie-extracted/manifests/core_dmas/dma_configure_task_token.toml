[test]
name = "core_dmas/dma_configure_task_token"
source_dir = "test/npu-xrt/core_dmas/dma_configure_task_token"
description = "DMA passthrough with token-based synchronization and packet flow routing"

[build]
mlir_file = "aie.mlir"
device = "npu1_1col"

[buffers.input_a]
size = 1024
element_type = "i32"
group_id = 3

[buffers.input_a.pattern]
type = "sequential"
start = 1
step = 1

[buffers.output]
size = 1024
element_type = "i32"
group_id = 4

[expected]
type = "transform"
transform = "input_a + 0"
