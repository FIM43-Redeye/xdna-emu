# Test manifest for ctrl_packet_reconfig_1x4_cores
# Source: test/npu-xrt/ctrl_packet_reconfig_1x4_cores
# 4 cores each add (12 + core_id) to their chunk of input
# Core 0: +12, Core 1: +13, Core 2: +14, Core 3: +15
# Input: sequential i+1, 4096 elements per core, 16384 total

[test]
name = "ctrl_packet_reconfig_1x4_cores"
source_dir = "test/npu-xrt/ctrl_packet_reconfig_1x4_cores"
description = "4-core control packet reconfig with per-core add offsets"

[build]
mlir_file = "aie.mlir"
device = "npu1_1col"
compiler = "chess"

[buffers.input_a]
size = 16384
element_type = "i8"
group_id = 3

[buffers.input_a.pattern]
type = "sequential"
start = 1
step = 1

[buffers.output]
size = 16384
element_type = "i8"
group_id = 4

# Per-core: core N adds (12+N) to elements [N*4096..(N+1)*4096]
# Too large for values array; use reference validation from HW capture
[expected]
type = "reference"
