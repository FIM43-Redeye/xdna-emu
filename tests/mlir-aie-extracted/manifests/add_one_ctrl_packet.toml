[test]
name = "add_one_ctrl_packet"
source_dir = "test/npu-xrt/add_one_ctrl_packet"
description = "Control packet routing to configure a tile that adds 1"
expected_fail = true
expected_fail_reason = "Peano compiler alias analysis failure -- emulator and hardware produce identical wrong output"

[build]
mlir_file = "aie.mlir"
device = "npu1_1col"

# Uses 3 buffers: ctrl_out (gid 3), ctrl_in (gid 4), dma_out (gid 5)
# Control packets write to lock registers to unblock the core's sync points.
# The core initializes input_buffer[i] = i+3, increments 4 times (via lock
# acquires), copies to output_buffer, then DMA sends it.
#
# Host control packet format (from test.cpp):
#   Packet 0: Write Lock0_value (0x1F000) = 2  (enables 2 lock acquires)
#   Packet 1: Write Lock2_value (0x1F020) = 2  (enables 2 more lock acquires)
#   Packet 2: Read 4 words from 0x440 (response via pkt_id=2)
#   Packet 3: Read 4 words from 0x450 (response via pkt_id=2)
#
# Packets 2-3 are read requests that need response routing (not yet supported).

[buffers.ctrl_out]
size = 8
element_type = "i32"
group_id = 3

[buffers.ctrl_out.pattern]
type = "zeros"

# Control packet input buffer: properly formatted ctrl packet headers + data.
# Each pair is (header, data) for write ops, or (header) for read ops.
# Header format: parity[31] | stream_id[30:24] | op[23:22] | beats-1[21:20] | addr[19:0]
[buffers.input_a]
size = 8
element_type = "i32"
group_id = 4

[buffers.input_a.pattern]
type = "values"
# Packet 0: header=0x0001F000 (write Lock0_value, 1 beat), data=2
# Packet 1: header=0x8001F020 (write Lock2_value, 1 beat, parity), data=2
# Packet 2: header=0x82700440 (read 4 beats from 0x440, stream_id=2)
# Packet 3: header=0x02700450 (read 4 beats from 0x450, stream_id=2)
values = [0x0001F000, 2, 0x8001F020, 2, 0x82700440, 0x02700450, 0, 0]

[buffers.output]
size = 8
element_type = "i32"
group_id = 5

# DMA output: core starts with input_buffer[i] = i+3, increments 4 times -> 7+i
[expected]
type = "values"
values = [7, 8, 9, 10, 11, 12, 13, 14]
