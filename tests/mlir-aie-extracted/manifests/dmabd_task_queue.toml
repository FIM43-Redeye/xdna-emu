[test]
name = "dmabd_task_queue"
source_dir = "test/npu-xrt/dmabd_task_queue"
description = "DMA BD task queue with multi-buffer accumulation"
expected_fail = true
expected_fail_reason = "Multi-buffer partial sum accumulation not expressible as simple transform"

[build]
mlir_file = "aie.mlir"
device = "npu1_1col"

# 4 buffers: A (5 i32, gid 3), B (96 i32, gid 4), C (96 i32, gid 5), D (9 i32, gid 6)
# D[0] = sum(A), D[1..8] = sum(B[12*(i-1):12*i]) + sum(C[12*(i-1):12*i])

[buffers.input_a]
size = 5
element_type = "i32"
group_id = 3

[buffers.input_a.pattern]
type = "sequential"
start = 0
step = 1

[buffers.input_b]
size = 96
element_type = "i32"
group_id = 4

[buffers.input_b.pattern]
type = "sequential"
start = 1
step = 1

[buffers.input_c]
size = 96
element_type = "i32"
group_id = 5

[buffers.input_c.pattern]
type = "sequential"
start = 2
step = 1

[buffers.output]
size = 9
element_type = "i32"
group_id = 6

[expected]
type = "reference"
# Expected output loaded from tests/npu-outputs/dmabd_task_queue/output.bin
# D[0] = sum(A), D[1..8] = sum(B[12*(i-1):12*i]) + sum(C[12*(i-1):12*i])
