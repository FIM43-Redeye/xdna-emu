[test]
name = "add_one_ctrl_packet_col_overlay"
source_dir = "test/npu-xrt/add_one_ctrl_packet_col_overlay"
description = "Control packet with column control overlay for add-1"
expected_fail = true
expected_fail_reason = "Column control overlay and control packet routing not yet supported"

[build]
mlir_file = "aie.mlir"
device = "npu1_1col"

[buffers.input_a]
size = 64
element_type = "i32"
group_id = 4

[buffers.input_a.pattern]
type = "sequential"
start = 3
step = 1

[buffers.output]
size = 64
element_type = "i32"
group_id = 5

[expected]
type = "transform"
transform = "input_a + 1"
