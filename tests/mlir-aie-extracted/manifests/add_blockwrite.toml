# Test manifest for add_blockwrite
# Source: test/npu-xrt/add_blockwrite

[test]
name = "add_blockwrite"
source_dir = "test/npu-xrt/add_blockwrite"
description = "Blockwrite constants [1,2,3,4,42,6,7,8] to tile memory, add to input"
expected_fail = false

[build]
mlir_file = "aie.mlir"
device = "npu1_1col"

[buffers.input_a]
size = 64
element_type = "i32"
group_id = 3

[buffers.input_a.pattern]
type = "sequential"
start = 1
step = 1

[buffers.output]
size = 64
element_type = "i32"
group_id = 5

# Expected: output[i] = (i + 1) + c[i % 8]
# where c = [1, 2, 3, 4, 42, 6, 7, 8]
# (blockwrite writes [1..8], write32 overwrites c[4] = 42)
[expected]
type = "values"
values = [
    2, 4, 6, 8, 47, 12, 14, 16,
    10, 12, 14, 16, 55, 20, 22, 24,
    18, 20, 22, 24, 63, 28, 30, 32,
    26, 28, 30, 32, 71, 36, 38, 40,
    34, 36, 38, 40, 79, 44, 46, 48,
    42, 44, 46, 48, 87, 52, 54, 56,
    50, 52, 54, 56, 95, 60, 62, 64,
    58, 60, 62, 64, 103, 68, 70, 72,
]
