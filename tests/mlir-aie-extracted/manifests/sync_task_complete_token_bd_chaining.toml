[test]
name = "sync_task_complete_token_bd_chaining"
source_dir = "test/npu-xrt/sync_task_complete_token_bd_chaining"
description = "Sync token completion with BD chaining and reduction"
expected_fail = true
expected_fail_reason = "Emulator does not yet support reduction kernels with BD chaining"

[build]
mlir_file = "aie2.py"
device = "npu1_1col"

# Similar to sync_task_complete_token but uses BD chaining

[buffers.input_a]
size = 256
element_type = "i32"
group_id = 3

[buffers.input_a.pattern]
type = "sequential"
start = 0
step = 1

[buffers.output]
size = 16
element_type = "i32"
group_id = 4

[expected]
type = "reference"
# Expected output loaded from tests/npu-outputs/sync_task_complete_token_bd_chaining/output.bin
# Reduction: output[i] = sum(input[i*16 : (i+1)*16])
