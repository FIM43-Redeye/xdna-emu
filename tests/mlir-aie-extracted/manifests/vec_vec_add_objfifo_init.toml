[test]
name = "vec_vec_add_objfifo_init"
source_dir = "test/npu-xrt/vec_vec_add_objfifo_init"
description = "Vector-vector add using pre-initialized objfifo (MLIR initValues)"

[build]
mlir_file = "aie2.py"
device = "npu1_1col"

# input_a is pre-loaded via MLIR initValues=[1..256] on the memtile.
# The host also provides input_a=[1..256] (matching the init values).
# input_b is provided by the host. Output = initValues + input_b.
# Since host input_a matches initValues, the transform is equivalent.

[buffers.input_a]
size = 256
element_type = "i32"
group_id = 3

[buffers.input_a.pattern]
type = "sequential"
start = 1
step = 1

[buffers.input_b]
size = 256
element_type = "i32"
group_id = 4

[buffers.input_b.pattern]
type = "sequential"
start = 0
step = 1

[buffers.output]
size = 256
element_type = "i32"
group_id = 5

[expected]
type = "transform"
transform = "input_a + input_b"
