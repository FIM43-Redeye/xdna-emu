# Test manifest for matrix_transpose
# Source: test/npu-xrt/matrix_transpose
# Transpose a 7x19 matrix (row-major) to 19x7 (row-major)

[test]
name = "matrix_transpose"
source_dir = "test/npu-xrt/matrix_transpose"
description = "DMA-based matrix transpose of 7x19 i32 matrix"

[build]
mlir_file = "aie2.py"
device = "npu1_1col"
compiler = "chess"

[buffers.input_a]
size = 133
element_type = "i32"
group_id = 3

# Input: sequential 0..132 (7 rows x 19 cols, row-major)
[buffers.input_a.pattern]
type = "sequential"
start = 0
step = 1

[buffers.output]
size = 133
element_type = "i32"
group_id = 4

# Transposed: output[col*7 + row] = input[row*19 + col]
# Reading input row-major 7x19, writing output row-major 19x7
[expected]
type = "values"
values = [
    0, 19, 38, 57, 76, 95, 114,
    1, 20, 39, 58, 77, 96, 115,
    2, 21, 40, 59, 78, 97, 116,
    3, 22, 41, 60, 79, 98, 117,
    4, 23, 42, 61, 80, 99, 118,
    5, 24, 43, 62, 81, 100, 119,
    6, 25, 44, 63, 82, 101, 120,
    7, 26, 45, 64, 83, 102, 121,
    8, 27, 46, 65, 84, 103, 122,
    9, 28, 47, 66, 85, 104, 123,
    10, 29, 48, 67, 86, 105, 124,
    11, 30, 49, 68, 87, 106, 125,
    12, 31, 50, 69, 88, 107, 126,
    13, 32, 51, 70, 89, 108, 127,
    14, 33, 52, 71, 90, 109, 128,
