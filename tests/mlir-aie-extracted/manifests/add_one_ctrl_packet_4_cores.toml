[test]
name = "add_one_ctrl_packet_4_cores"
source_dir = "test/npu-xrt/add_one_ctrl_packet_4_cores"
description = "Control packet routing to 4 tiles that each add 1"
skip = true
skip_reason = "Multi-core control packet routing requires special NPU instruction handling"

[build]
mlir_file = "aie.mlir"
device = "npu1_1col"

# 4 tiles each execute add-1 on 8-element blocks
# DMA output: 32 values, pattern [7..14] repeated 4x

[buffers.input_a]
size = 64
element_type = "i32"
group_id = 4

[buffers.input_a.pattern]
type = "sequential"
start = 3
step = 1

[buffers.output]
size = 64
element_type = "i32"
group_id = 5

[expected]
type = "transform"
transform = "input_a + 1"
