# Verbose firmware logging + tracing + driver debug for amdxdna.
#
# This NPU is a development machine -- enabling all available logging
# surfaces FW and driver-internal information at the cost of some
# coherent buffers and dmesg verbosity.
#
# - fw_log_level=4: DEBUG verbosity (4=DEBUG, 3=INFO, 2=WARN, 1=ERROR, 0=DISABLE)
#   (Phoenix firmware 1.5.5.391 silently ignores this -- MSG_OP_CONFIG_FW_LOG
#   not supported. Set in advance for future firmware versions that do.)
# - fw_trace_categories=0xFFFFFFFF: enable all FW trace event categories
# - poll_fw_trace=1: poll the trace buffer (otherwise it may not advance)
# - fw_log_size / fw_trace_size: 4MB buffers (driver default; explicit for clarity)
# - dyndbg=+p: enable all dynamic-debug pr_debug() / XDNA_DBG() messages.
#   Persists across module reloads; without this dynamic-debug resets to off.
options amdxdna fw_log_level=4 fw_trace_categories=0xFFFFFFFF fw_log_size=4194304 fw_trace_size=4194304 poll_fw_trace=1 dyndbg=+p
