[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

# Point the tblgen crate at our local llvm-aie build (it expects
# `<prefix>/bin/llvm-config` to be the LLVM 21.x install we use, not
# whatever older llvm-config happens to be in PATH). Resolved relative
# to this config file (xdna-emu/.cargo/config.toml -> ../llvm-aie/build).
# Override per-shell with TABLEGEN_210_PREFIX=/path/to/llvm-build if needed.
[env]
TABLEGEN_210_PREFIX = { value = "../llvm-aie/build", relative = true, force = false }
